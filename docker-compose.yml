# Dev:  docker compose --profile dev up -d
# Prod: docker compose --profile prod up -d

services:

  # ── Shared: PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cms_bypur_postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cms_bypur}
      POSTGRES_USER: ${DB_USERNAME:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-portfolio} -d ${DB_DATABASE:-cms_bypur}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Shared: Redis ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: cms_bypur_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    networks:
      - portfolio_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Development ───────────────────────────────────────────────
  app:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      target: app-local
    container_name: cms_bypur_app
    working_dir: /var/www/html
    env_file: .env
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
    networks:
      portfolio_network:
        aliases: [app]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    profiles: [dev]
    image: nginx:1.27-alpine
    container_name: cms_bypur_nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - portfolio_network
    depends_on:
      - app

  node:
    profiles: [dev]
    image: node:20-alpine
    container_name: cms_bypur_node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node_modules_cache:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - portfolio_network

  queue:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      target: app-local
    container_name: cms_bypur_queue
    working_dir: /var/www/html
    env_file: .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
    networks:
      - portfolio_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Production ────────────────────────────────────────────────
  app-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      target: app-production
    container_name: cms_bypur_app
    restart: always
    working_dir: /var/www/html
    env_file: .env
    networks:
      portfolio_network:
        aliases: [app]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-production
    container_name: cms_bypur_nginx
    restart: always
    ports:
      - "127.0.0.1:${NGINX_PORT:-8080}:80"
    networks:
      - portfolio_network
    depends_on:
      - app-prod

  queue-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      target: app-production
    container_name: cms_bypur_queue
    restart: always
    working_dir: /var/www/html
    env_file: .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - portfolio_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  vendor_cache:
  node_modules_cache:

networks:
  portfolio_network:
    driver: bridge
    name: portfolio_network
