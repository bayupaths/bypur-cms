services:

  # ── Traefik v3 — Reverse Proxy ────────────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: portfolio_admin_traefik
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=portfolio_network"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.bypur.test`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
    networks:
      - portfolio_network

  # ── PHP Application ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-local
    container_name: portfolio_admin_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
      - node_modules_cache:/var/www/html/node_modules
    env_file:
      - .env
    networks:
      - portfolio_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio_admin_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`portfolio.bypur.test`)"
      - "traefik.http.routers.portfolio.entrypoints=web"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"
    networks:
      - portfolio_network
    depends_on:
      - app
      - traefik

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_admin_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-portfolio_admin}
      POSTGRES_USER: ${DB_USERNAME:-portfolio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-portfolio} -d ${DB_DATABASE:-portfolio_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: portfolio_admin_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    networks:
      - portfolio_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Queue Worker ──────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-local
    container_name: portfolio_admin_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
    env_file:
      - .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - portfolio_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Node / Vite ───────────────────────────────────────────────
  node:
    image: node:20-alpine
    container_name: portfolio_admin_node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node_modules_cache:/var/www/html/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - portfolio_network

volumes:
  postgres_data:
  redis_data:
  vendor_cache:
  node_modules_cache:

networks:
  portfolio_network:
    driver: bridge
