# /etc/nginx/sites-available/cms.bypur.my.id
# certbot --nginx -d cms.bypur.my.id

server {
    listen 80;
    server_name cms.bypur.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cms.bypur.my.id;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/cms.bypur.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.bypur.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    access_log /var/log/nginx/cms.bypur.my.id.access.log;
    error_log  /var/log/nginx/cms.bypur.my.id.error.log;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    error_page 502 503 504 @down;
    location @down {
        default_type text/html;
        return 503 '<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><title>503</title><style>body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f8fafc;color:#1e293b}.box{text-align:center}h1{font-size:5rem;font-weight:700;margin:0;color:#94a3b8}p{color:#64748b}</style></head><body><div class="box"><h1>503</h1><p>Layanan sedang tidak tersedia.<br>Mohon coba beberapa saat lagi.</p></div></body></html>';
    }

    location / {
        proxy_pass            http://127.0.0.1:8080;
        proxy_http_version    1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    300;
        proxy_connect_timeout 60;
    }
}
